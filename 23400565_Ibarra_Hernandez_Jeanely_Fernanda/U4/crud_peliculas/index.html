<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD de Películas</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="contenedor">
        <h1>CRUD de Películas</h1>
        <div class="form">
        <form id="formulario">
            <input type="hidden" placeholder="Id" id="id">
            <input type="text" placeholder="Título" id="titulo">
            <input type="text" placeholder="Director" id="director">
            <input type="number" placeholder="Año" id="año">
            <button type="submit">Guardar</button>        
        </form>
        <br>
        </div>
        <table border="1">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Título</th>
                    <th>Director</th>
                    <th>Año</th>
                    <th>Acciones</th>
                </tr>                
            </thead>
            <tbody id="tablaPeliculas"></tbody>        
        </table>
    </div>
    <script src="script.js"></script>
    
</body>
</html>
