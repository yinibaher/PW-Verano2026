<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Facebook - Iniciar Sesión</title>
        <style>
            body{
                margin: 0;
                min-height: 90vh;
                display: flex;
                justify-content: center; 
                align-items: center; 
                background-color: #f0f2f7;
            }

            .principal{
                width: 60%;
                display: grid;
                grid-template-columns: repeat(2,1fr);
                gap: 45px;
                padding: 20px;
                font-family: Helvetica, Arial, sans-serif;
            }

            h1{
                color:#1877f2
            }

            #izq{
                font-size:x-large;
            }

            #form{
                display: flex;
                flex-direction: column;
                gap: 10px;
                padding: 20px;
                background-color: white;
                border-radius: 16px;
                box-shadow: 0 2px 12px rgba(85, 82, 82, 0.15); ;
            }

            .inputs{
                display: flex;
                flex-direction: column;
                gap: 10px;
                
            }

            input{
                width: 100%;
                box-sizing: border-box;
                padding: 10px;
                border-radius: 8px;
                border:1px solid grey;
            }

            .iniciar{
                background-color:#0866ff;
                border: none;
                color: white;
                font-weight: bold;
                font-size: medium;
            }

            .olvidar{
                color:#0866ff;
                font-size:small;
                text-align: center;
                text-decoration: none;
                margin-top: 3px;
            }

            hr{
                border: none;
                height: 1px;
                width: 100%;
                background-color: #dadde1;
                margin: 10px 0;
            }

            .crear{
                width: 80%;
                align-self: center;
                background-color: #42b72a;
                border: none;
                color: white;
                font-weight: bold;
                font-size: medium;
            }
            
            .note{
                margin-top: 20px;
                font-size: medium;
                text-align: center;
            }
        </style>
    </head>
    <body>
        <main class="principal">
            <section id="izq"> 
                <h1>Facebook</h1>
                <p>Facebook te ayuda a comunicarte y compartir con las personas que forman parte de tu vida.</p>
            </section> 

            <section id="der">                     
            <div id="form">
                <div class="inputs">
                    <input type="text" placeholder="Correo electrónico o número de teléfono">
                    <input type="password" placeholder="Contraseña">
                    <input class="iniciar" type="submit" value="Iniciar Sesión">
                </div>
                <a class="olvidar" href="">¿Olvidaste tu constraseña?</a>
                <hr>
                <input class="crear" type="submit" value="Crear cuenta nueva">                          
            </div>
                <p class="note">
                <strong>Crea una página</strong> para una celebridad, una marca o un negocio
                </p>
            </section>    
        </main>
    </body>
</html>
